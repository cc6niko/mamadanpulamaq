<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anama S√Љrpriz вЭ§пЄП</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff1f1, #ffd3d3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(214, 48, 49, 0.15);
            text-align: center;
            max-width: 420px;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        /* Sabit qalan u≈Яaqlƒ±q ≈Я…Щkli */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffd3d3;
            box-shadow: 0 8px 20px rgba(214, 48, 49, 0.1);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        .emoji {
            font-size: 35px;
            margin-bottom: 15px;
            display: block;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 8px 20px rgba(214, 48, 49, 0.1); }
            50% { transform: scale(1.04); box-shadow: 0 8px 25px rgba(214, 48, 49, 0.2); }
            100% { transform: scale(1); box-shadow: 0 8px 20px rgba(214, 48, 49, 0.1); }
        }

        h2 {
            color: #2d3436;
            font-size: 21px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 35px;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 60px;
            position: relative;
            width: 100%;
        }

        button {
            padding: 14px 0;
            width: 120px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .btn-yes {
            background-color: #2ecc71;
            color: white;
            transition: transform 0.1s, background-color 0.2s;
        }

        .btn-yes:active {
            transform: scale(0.92);
            background-color: #27ae60;
        }

        .btn-no {
            background-color: #dfe6e9;
            color: #636e72;
            position: absolute;
            left: 55%;
            transition: background-color 0.2s;
            will-change: top, left;
            touch-action: none;
        }

        @media (max-width: 480px) {
            h2 {
                font-size: 18px;
            }
            button {
                width: 105px;
                padding: 12px 0;
                font-size: 16px;
            }
            .profile-img {
                width: 110px;
                height: 110px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- ≈Ю…Щkliniz h…Щr addƒ±mda yuxarƒ±da sabit qalƒ±r -->
        <img src="img45.jpeg" alt="Anam v…Щ m…Щn" class="profile-img">
        <span class="emoji" id="emoji">рЯС©вАНрЯС¶вЭ§пЄП</span>
        <h2 id="question">Canƒ±m anam, bu d√Љnyada m…Щni hamƒ±dan √Іox ist…Щy…Щn s…ЩnS∆ПN, d√Љzd√Љr? рЯ•∞</h2>
        <div class="btn-container">
            <button class="btn-yes" id="yesBtn">H…Щ d√Љzd√Љr</button>
            <button class="btn-no" id="noBtn">Yox</button>
        </div>
    </div>

    <script>
        // Tamamil…Щ 20 manata kilidl…Щnlmi≈Я s…Щmimi dialoq ssenarisi
        const steps = [
            { question: "Canƒ±m anam, bu d√Љnyada m…Щni hamƒ±dan √Іox ist…Щy…Щn s…ЩnS∆ПN, d√Љzd√Љr? рЯ•∞", emoji: "рЯС©вАНрЯС¶вЭ§пЄП" },
            { question: "Gec…Щl…Щr oyaq qalƒ±b, m…Щn…Щ min bir z…Щhm…Щtl…Щ baxmƒ±san, haqqƒ±n √ґd…Щnm…Щz... рЯ•Ї", emoji: "вЬ®рЯЩПвЬ®" },
            { question: "Yax≈Яƒ±, b…Щs b√ґy√Љd√Љb boya-ba≈Яa √Іatdƒ±rdƒ±ƒЯƒ±n bu aƒЯƒ±llƒ± √ґvladƒ±n f…Щxrindir? рЯШО", emoji: "рЯСС" },
            { question: "ƒ∞ndi bu boyda f…Щxr olunasƒ± √ґvladƒ±n s…Щnd…Щn bir azca cib x…Щrcliyi ist…Щs…Щ, y…Щqin ki, yox dem…Щzs…Щn? рЯШЙрЯСЙрЯСИ", emoji: "рЯТµ" },
            { question: "M…Щs…Щl…Щn, el…Щ d…Щ √Іox yox, c…Щmi birc…Щ d…Щn…Щ 20 manatcƒ±q... Ver…Щrs…Щn bir d…Щn…Щ? рЯТЄрЯШВ", emoji: "рЯ§Ф" },
            { question: "Ay canƒ±m m…Щnim! Razƒ±la≈Яdƒ±q o zaman, naƒЯd yoxsa karta g√ґnd…Щrirs…Щn? рЯ•≥рЯТ∞", emoji: "рЯЪАрЯЫНпЄП" }
        ];

        let currentStep = 0;

        const questionTxt = document.getElementById('question');
        const emojiTxt = document.getElementById('emoji');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');

        // "Yox" d√Љym…Щsini h…Щm mobild…Щ, h…Щm PC-d…Щ d…Щrhal qa√Іƒ±ran funksiya
        function moveNoButton(e) {
            if (e) e.preventDefault();

            const padding = 30;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton, { passive: false });
        noBtn.addEventListener('mousedown', moveNoButton);

        // "H…Щ" d√Љym…Щsin…Щ klik addƒ±mlarƒ±
        yesBtn.addEventListener('click', () => {
            currentStep++;

            if (currentStep < steps.length) {
                questionTxt.innerText = steps[currentStep].question;
                emojiTxt.innerText = steps[currentStep].emoji;
                
                // "Yox" d√Љym…Щsini n√ґvb…Щti sualda ilkin yerin…Щ qaytarƒ±rƒ±q
                noBtn.style.position = 'absolute';
                noBtn.style.left = '55%';
                noBtn.style.top = 'auto';
            } else {
                // Pul t…Щsdiql…Щn…Щnd…Щn sonrakƒ± final ekranƒ±
                questionTxt.innerHTML = "M…Щnim xeyirxah, √Љr…Щyi yum≈Яaq anam! <br> 20 manatlƒ±q transfer q…Щbul olundu, g√ґzl…Щyir…Щm! рЯШВвЭ§пЄПрЯОЙ";
                emojiTxt.innerText = "рЯТМрЯТОрЯТЄ";
                yesBtn.style.display = 'none';
                noBtn.style.display = 'none';
            }
        });
    </script>

</body>
</html>
