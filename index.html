<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anama Sürpriz ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff1f1, #ffd3d3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(214, 48, 49, 0.15);
            text-align: center;
            max-width: 420px;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        /* images qovluğundakı uşaqlıq şəkli üçün dizayn */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffd3d3;
            box-shadow: 0 8px 20px rgba(214, 48, 49, 0.1);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        .emoji {
            font-size: 35px;
            margin-bottom: 15px;
            display: block;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 8px 20px rgba(214, 48, 49, 0.1); }
            50% { transform: scale(1.04); box-shadow: 0 8px 25px rgba(214, 48, 49, 0.2); }
            100% { transform: scale(1); box-shadow: 0 8px 20px rgba(214, 48, 49, 0.1); }
        }

        h2 {
            color: #2d3436;
            font-size: 21px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 35px;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 60px;
            position: relative;
            width: 100%;
        }

        button {
            padding: 14px 0;
            width: 120px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .btn-yes {
            background-color: #2ecc71;
            color: white;
            transition: transform 0.1s, background-color 0.2s;
        }

        .btn-yes:active {
            transform: scale(0.92);
            background-color: #27ae60;
        }

        .btn-no {
            background-color: #dfe6e9;
            color: #636e72;
            position: absolute;
            left: 55%;
            transition: background-color 0.2s;
            will-change: top, left;
            touch-action: none;
        }

        @media (max-width: 480px) {
            h2 {
                font-size: 18px;
            }
            button {
                width: 105px;
                padding: 12px 0;
                font-size: 16px;
            }
            .profile-img {
                width: 110px;
                height: 110px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Şəkil yolu images/img45.jpeg olaraq yeniləndi -->
        <img src="images/img45.jpeg" alt="Anam və mən" class="profile-img">
        <span class="emoji" id="emoji">👩‍👦❤️</span>
        <h2 id="question">Canım anam, bu dünyada məni hamıdan çox istəyən sənSƏN, düzdür? 🥰</h2>
        <div class="btn-container">
            <button class="btn-yes" id="yesBtn">Hə düzdür</button>
            <button class="btn-no" id="noBtn">Yox</button>
        </div>
    </div>

    <script>
        const steps = [
            { question: "Canım anam, bu dünyada məni hamıdan çox istəyən sənSƏN, düzdür? 🥰", emoji: "👩‍👦❤️" },
            { question: "Gecələr oyaq qalıb, mənə min bir zəhmətlə baxmısan, haqqın ödənməz... 🥺", emoji: "✨🙏✨" },
            { question: "Yaxşı, bəs böyüdüb boya-başa çatdırdığın bu ağıllı övladın fəxrindir? 😎", emoji: "👑" },
            { question: "İndi bu boyda fəxr olunası övladın səndən bir azca cib xərcliyi istəsə, yəqin ki, yox deməzsən? 😉👉👈", emoji: "💵" },
            { question: "Məsələn, elə də çox yox, cəmi bircə dənə 20 manatcıq... Verərsən bir dənə? 💸😂", emoji: "🤔" },
            { question: "Ay canım mənim! Razılaşdıq o zaman, nağd yoxsa karta göndərirsən? 🥳💰", emoji: "🚀🛍️" }
        ];

        let currentStep = 0;

        const questionTxt = document.getElementById('question');
        const emojiTxt = document.getElementById('emoji');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');

        function moveNoButton(e) {
            if (e) e.preventDefault();

            const padding = 30;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton, { passive: false });
        noBtn.addEventListener('mousedown', moveNoButton);

        yesBtn.addEventListener('click', () => {
            currentStep++;

            if (currentStep < steps.length) {
                questionTxt.innerText = steps[currentStep].question;
                emojiTxt.innerText = steps[currentStep].emoji;
                
                noBtn.style.position = 'absolute';
                noBtn.style.left = '55%';
                noBtn.style.top = 'auto';
            } else {
                questionTxt.innerHTML = "Mənim xeyirxah, ürəyi yumşaq anam! <br> 20 manatlıq transfer qəbul olundu, gözləyirəm! 😂❤️🎉";
                emojiTxt.innerText = "💌💎💸";
                yesBtn.style.display = 'none';
                noBtn.style.display = 'none';
            }
        });
    </script>

</body>
</html>
