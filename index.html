<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anama Sürpriz ❤️</title>
    <!-- Konfeti kitabxanası -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff1f1, #ffd3d3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(214, 48, 49, 0.15);
            text-align: center;
            max-width: 440px;
            width: 100%;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffd3d3;
            box-shadow: 0 8px 20px rgba(214, 48, 49, 0.1);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        .emoji {
            font-size: 35px;
            margin-bottom: 15px;
            display: block;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        h2 {
            color: #2d3436;
            font-size: 20px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 25px;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Slayder və Kart Paneli üçün stillər */
        .slider-container, .card-container {
            margin-bottom: 25px;
            background: #fff5f5;
            padding: 15px;
            border-radius: 15px;
            border: 1px dashed #ffb3b3;
        }

        .slider-container {
            display: block;
        }

        .card-container {
            display: none;
            padding: 10px;
            background: #fff;
            border: none;
        }

        /* Finalda çıxacaq böyük şəkil stili */
        .final-img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: none;
        }

        .slider-label {
            font-size: 26px;
            font-weight: bold;
            color: #d63031;
            display: block;
            margin-top: 10px;
        }

        input[type="range"] {
            width: 100%;
            margin-top: 10px;
            accent-color: #2ecc71;
        }

        .card-number {
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            background: #f1f2f6;
            padding: 12px;
            border-radius: 10px;
            display: block;
            margin-bottom: 15px;
            color: #2d3436;
            border: 2px solid #dfe6e9;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 60px;
            position: relative;
            width: 100%;
        }

        button {
            padding: 14px 0;
            width: 120px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: all 0.2s;
        }

        .btn-yes {
            background-color: #2ecc71;
            color: white;
        }

        .btn-yes:active { transform: scale(0.92); }

        .btn-no {
            background-color: #dfe6e9;
            color: #636e72;
            position: absolute;
            left: 55%;
            touch-action: none;
            display: none;
        }

        .btn-copy {
            background-color: #3498db;
            color: white;
            width: 85%;
            margin: 0 auto;
            display: none;
            border-radius: 12px;
        }

        @media (max-width: 480px) {
            h2 { font-size: 18px; }
            button { width: 105px; font-size: 15px; }
            .final-img { max-height: 220px; }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Giriş və sual şəkli -->
        <img src="images/img45.jpeg" alt="Anam və mən" class="profile-img" id="mainImg">
        
        <!-- Finalda çıxacaq böyük şəkil (ilkin olaraq gizlidir) -->
        <img src="images/img46.jpeg" alt="Sürpriz" class="final-img" id="finalImg">

        <span class="emoji" id="emoji">📊💸</span>
        <h2 id="question">Canım anam, ilk öncə könlündən qopan cib xərcliyini seç görək... 🥰</h2>
        
        <!-- Slayder Bölməsi -->
        <div class="slider-container" id="sliderContainer">
            <p style="font-size: 14px; color: #636e72;">Məbləğ (Yalnız artırmaq olar, aşağı düşmür 😜):</p>
            <input type="range" id="moneySlider" min="20" max="100" value="20" step="5">
            <span class="slider-label" id="sliderValue">20 AZN</span>
        </div>

        <!-- Kart Kopyalama Bölməsi -->
        <div class="card-container" id="cardContainer">
            <!-- Bura öz real kart nömrəni yaza bilərsən -->
            <span class="card-number" id="cardNumber">4098 5844 5022 1112</span>
            <p id="copyStatus" style="font-size: 13px; color: #2ecc71; font-weight: bold; min-height: 18px; margin-top: 5px;"></p>
        </div>

        <div class="btn-container">
            <button class="btn-yes" id="yesBtn">İrəli ➡️</button>
            <button class="btn-no" id="noBtn">Yox</button>
            <button class="btn-copy" id="copyBtn">Nömrəni Kopyala</button>
        </div>
    </div>

    <script>
        const steps = [
            { question: "Canım anam, bu dünyada məni hamıdan çox istəyən sənSƏN, düzdür? 🥰", emoji: "👩‍👦❤️", showNoBtn: true },
            { question: "Gecələr oyaq qalıb, mənə min bir zəhmətlə baxmısan, haqqın ödənməz... 🥺", emoji: "✨🙏✨", showNoBtn: true },
            { question: "Yaxşı, bəs böyüdüb boya-başa çatdırdığın bu ağıllı övladın fəxrindir? 😎", emoji: "👑", showNoBtn: true },
            { question: "İndi bu boyda fəxr olunası övladın səndən bayaq seçdiyin o kiçik məbləği istəsə, yox deməzsən hər halda? 😉👉👈", emoji: "💵", showNoBtn: true },
            { question: "Ay canım mənim! Razılaşdıq o zaman, transferi təsdiqləyirik? 🥳💰", emoji: "🚀🛍️", showNoBtn: true }
        ];

        let currentStep = -1; 
        let noScale = 1;

        const mainImg = document.getElementById('mainImg');
        const finalImg = document.getElementById('finalImg');
        const questionTxt = document.getElementById('question');
        const emojiTxt = document.getElementById('emoji');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const copyBtn = document.getElementById('copyBtn');
        const sliderContainer = document.getElementById('sliderContainer');
        const cardContainer = document.getElementById('cardContainer');
        const moneySlider = document.getElementById('moneySlider');
        const sliderValue = document.getElementById('sliderValue');
        const cardNumber = document.getElementById('cardNumber');
        const copyStatus = document.getElementById('copyStatus');

        moneySlider.addEventListener('input', (e) => {
            if(e.target.value < 20) e.target.value = 20;
            sliderValue.innerText = e.target.value + " AZN";
        });

        function moveNoButton(e) {
            if (e) e.preventDefault();

            const padding = 30;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noScale = Math.max(0.3, noScale - 0.15); 
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.transform = `scale(${noScale})`;
        }

        noBtn.addEventListener('mouseover', moveNoButton);
        noBtn.addEventListener('touchstart', moveNoButton, { passive: false });
        noBtn.addEventListener('mousedown', moveNoButton);

        yesBtn.addEventListener('click', () => {
            currentStep++;

            if (currentStep === 0) {
                sliderContainer.style.display = 'none';
                yesBtn.innerText = "Hə düzdür";
            }

            if (currentStep < steps.length) {
                questionTxt.innerText = steps[currentStep].question;
                emojiTxt.innerText = steps[currentStep].emoji;
                
                if(steps[currentStep].showNoBtn) {
                    noBtn.style.display = 'block';
                }
                noScale = 1;
                noBtn.style.position = 'absolute';
                noBtn.style.left = '55%';
                noBtn.style.top = 'auto';
                noBtn.style.transform = 'scale(1)';

                confetti({ particleCount: 25, spread: 35, origin: { y: 0.8 } });
            } else {
                // FİNAL MƏRHƏLƏSİ
                const finalAmount = moneySlider.value;
                questionTxt.innerHTML = `Mənim xeyirxah, ürəyi yumşaq anam! <br> <span style="color:#2ecc71;">${finalAmount} AZN</span> göndərişini gözləyirəm! 😂❤️`;
                emojiTxt.style.display = 'none'; // Emojini gizlədirik ki, şəkilə yer qalsın
                
                // Köhnə girdə şəkli gizlət, yeni BÖYÜK şəkli göstər
                mainImg.style.display = 'none';
                finalImg.style.display = 'block';
                
                yesBtn.style.display = 'none';
                noBtn.style.display = 'none';
                
                // Kart nömrəsi panelini və kopyalama düyməsini aç
                cardContainer.style.display = 'block';
                copyBtn.style.display = 'block';

                // Dayanmadan yağan möhtəşəm konfeti yağışı
                var duration = 3 * 1000;
                var end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                    if (Date.now() < end) { requestAnimationFrame(frame); }
                }());
            }
        });

        copyBtn.addEventListener('click', () => {
            const textToCopy = cardNumber.innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                copyStatus.innerText = "📋 Kopyalandı! İndi mənə ata bilərsən 😉";
                confetti({ particleCount: 40, spread: 50, origin: { y: 0.8 } });
            }).catch(() => {
                copyStatus.innerText = "Xəta oldu, nömrəni skrinşot etsən də olar 😂";
            });
        });
    </script>

</body>
</html>
